# PixelMind VLM SFT Config
# Stage 4: Fine-tune VLM on multi-turn visual QA data
# Projector + LLM first/last layers are trainable.

model:
  hidden_size: 768
  num_hidden_layers: 8

vision:
  encoder_name: siglip2
  encoder_path: ./model/siglip2-base-p32-256-ve

training:
  save_dir: ./out
  save_weight: sft_vlm
  epochs: 1
  batch_size: 4
  learning_rate: 5.0e-6        # Low LR — most LLM layers frozen
  max_seq_len: 768
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 2
  freeze_llm: 1                # 1 = projector + first/last layers
  use_compile: 0

data:
  path: ../data/multimodal/sft_i2t.parquet

checkpoint:
  from_weight: pretrain_vlm    # loads pretrain_vlm_768.pth
  from_resume: 0

logging:
  log_interval: 100
  save_interval: 1000
  use_wandb: false
  wandb_project: PixelMind-VLM-SFT
